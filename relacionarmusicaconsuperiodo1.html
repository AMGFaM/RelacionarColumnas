<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relacionar periodos con audio</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* HEADER */
.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

h1{ margin:0; }

button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#00c3ff;
    color:white;
    cursor:pointer;
    font-size:14px;
}

button:hover{ background:#00a2d4; }

.container{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:30px;
    flex-wrap:wrap;
}

.columna{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* IZQUIERDA */
.dropzone{
    width:260px;
    height:51px;
    background:#1e2a38;
    border-radius:12px;
    border:2px dashed #5dade2;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 12px;
    box-sizing:border-box;

    position:relative; /* 👈 IMPORTANTE */
}

.label{ font-size:16px; }

/* SLOT */
.slot{
    position:relative;
    width:50px;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* FEEDBACK PRO */
.feedback{
    position:absolute;
    right:-28px; /* 👈 fuera del recuadro */
    top:50%;
    transform:translateY(-50%) scale(0.6);

    width:22px;
    height:22px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:13px;
    font-weight:bold;

    background:#222;
    box-shadow:0 0 0 2px #1e2a38;

    opacity:0;
    transition:all 0.25s ease;
}

.feedback.show{
    opacity:1;
    transform:translateY(-50%) scale(1);
}

.correct-icon{
    background:#2ecc71;
    color:white;
}

.incorrect-icon{
    background:#e74c3c;
    color:white;
}

/* DERECHA */
.draggable{
    width:60px;
    height:38px;
    background:#1e2a38;
    border-radius:12px;
    cursor:grab;
    display:flex;
    align-items:center;
    justify-content:center;
	overflow:hidden;
	
	user-select:none;
-webkit-user-select:none;
touch-action:manipulation;
transition: transform 0.45s ease;
}

.draggable:active{ cursor:grabbing; }

/* AUDIO */
.audio-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:#00c3ff;
    color:white;
    font-size:16px;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:0;
    line-height:1;
}

/* ESTADOS */
.correct{
    background:#2ecc71 !important;
    animation:pop 0.3s;
}

.incorrect{
    background:#e74c3c !important;
    animation:shake 0.3s;
}

@keyframes pop{
    0%{transform:scale(0.8);}
    100%{transform:scale(1);}
}

@keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    75%{transform:translateX(4px);}
}

/* RESULTADO */
.resultado{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

.mensaje{
    margin-top:10px;
    font-size:16px;
}
.columna{
    overflow:visible;
}
.dropzone.correct-zone{
    border:2px solid #2ecc71;
    box-shadow:0 0 10px rgba(46,204,113,0.4);
}

.dropzone.incorrect-zone{
    border:2px solid #e74c3c;
    box-shadow:0 0 10px rgba(231,76,60,0.4);
}
.dropzone.correct-zone{
    animation:glowGreen 0.4s ease;
}

.dropzone.incorrect-zone{
    animation:glowRed 0.4s ease;
}

@keyframes glowGreen{
    0%{box-shadow:0 0 0 rgba(46,204,113,0);}
    100%{box-shadow:0 0 12px rgba(46,204,113,0.6);}
}

@keyframes glowRed{
    0%{box-shadow:0 0 0 rgba(231,76,60,0);}
    100%{box-shadow:0 0 12px rgba(231,76,60,0.6);}
}
/* CRÉDITOS */
.creditos{
    position:fixed;
    bottom:-28px;
    left:0;
    width:100%;
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,0.65);
    background:rgba(0,0,0,0.18);
    padding:8px 0;
    transition:bottom 0.35s ease;
    backdrop-filter:blur(4px);
    z-index:999;
}

.creditos:hover{
    bottom:0;
}
</style>
</head>

<body>

<div class="header">
    <h1>Escucha los ejemplos musicales y colócalos en el Periodo artístico al que pertenecen</h1>
    <button onclick="verificar()">Verificar</button>
    <button onclick="reiniciar()">Reiniciar</button>
</div>

<div class="container">

    <div class="columna">

        <!-- TODOS con feedback -->
        <div class="dropzone" data-id="1"><span class="label">Medieval</span><div class="slot"></div><div class="feedback"></div></div>
        <div class="dropzone" data-id="2"><span class="label">Renacimiento</span><div class="slot"></div><div class="feedback"></div></div>
        <div class="dropzone" data-id="3"><span class="label">Barroco</span><div class="slot"></div><div class="feedback"></div></div>
        <div class="dropzone" data-id="4"><span class="label">Clásico</span><div class="slot"></div><div class="feedback"></div></div>
        <div class="dropzone" data-id="5"><span class="label">Romanticismo</span><div class="slot"></div><div class="feedback"></div></div>
        <div class="dropzone" data-id="6"><span class="label">Impresionismo</span><div class="slot"></div><div class="feedback"></div></div>
        <div class="dropzone" data-id="7"><span class="label">Expresionismo</span><div class="slot"></div><div class="feedback"></div></div>

    </div>

    <div class="columna" id="right"></div>

</div>

<div class="resultado" id="resultado"></div>
<div class="mensaje" id="mensaje"></div>

<script>

let bloqueado = false;

const audiosData = [
    {id:1, src:"medieval.mp3"},
    {id:2, src:"renacimiento.mp3"},
    {id:3, src:"barroco.mp3"},
    {id:4, src:"clásico.mp3"},
    {id:5, src:"romanticismo.mp3"},
    {id:6, src:"impresionismo.mp3"},
    {id:7, src:"expresionismo.mp3"}
];

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}
shuffle(audiosData);

const right = document.getElementById("right");

function crearAudios(){
    right.innerHTML="";
    audiosData.forEach(audio=>{
        let div = document.createElement("div");
        div.className="draggable";
        div.draggable=true;
        div.dataset.match=audio.id;

        div.innerHTML=`
            <button class="audio-btn">▶</button>
            <audio src="${audio.src}"></audio>
        `;

        right.appendChild(div);
    });

    activarEventos();
}

function activarEventos(){

    document.querySelectorAll(".draggable").forEach(item=>{
        let btn = item.querySelector("button");
        let audio = item.querySelector("audio");
		
		audio.onended = ()=>{
    btn.textContent = "▶";
};

        btn.onclick=(e)=>{
    e.stopPropagation();

    document.querySelectorAll("audio").forEach(a=>{
        if(a!==audio){
            a.pause();
            a.currentTime = 0;
            a.parentElement.querySelector("button").textContent="▶";
        }
    });

    if(audio.paused){
        audio.play();
        btn.textContent="⏸";
    }else{
        audio.pause();
        btn.textContent="▶";
    }

    // seleccionar visualmente
    document.querySelectorAll(".draggable").forEach(d=>{
        d.style.outline = "none";
    });

    item.style.outline = "3px solid #f1c40f";
    selected = item;
};

        item.addEventListener("dragstart",()=>!bloqueado && (dragged=item));
        item.addEventListener("touchstart",()=>!bloqueado && (touchItem=item));
    });

    document.querySelectorAll(".dropzone").forEach(zone=>{
        zone.ondragover=e=>e.preventDefault();

        zone.ondrop=()=>{
            if(bloqueado) return;
            let slot = zone.querySelector(".slot");
            if(slot.querySelector(".draggable")) return;
            slot.appendChild(dragged);
        };

        zone.ontouchend=()=>{
            if(bloqueado) return;
            let slot = zone.querySelector(".slot");
            if(slot.querySelector(".draggable")) return;
            if(touchItem){
                slot.appendChild(touchItem);
                touchItem=null;
            }
        };
		zone.onclick=()=>{
    if(bloqueado || !selected) return;

    let slot = zone.querySelector(".slot");
    if(slot.querySelector(".draggable")) return;

   selected.style.transform = "scale(0.85)";

setTimeout(()=>{
    slot.appendChild(selected);
    selected.style.transform = "scale(1)";
    selected.style.outline = "none";
    selected = null;
}, 400);
};
    });
}

let dragged=null;
let touchItem=null;
let selected=null;

// ✅ VERIFICAR CON ICONOS PRO
function verificar(){

    bloqueado = true;
    let aciertos = 0;

    document.querySelectorAll(".dropzone").forEach(zone=>{
        let item = zone.querySelector(".draggable");
        let feedback = zone.querySelector(".feedback");

        // limpiar estados previos
        zone.classList.remove("correct-zone","incorrect-zone");
        feedback.className = "feedback";
        feedback.textContent = "";

        if(!item) return;

        let ok = zone.dataset.id === item.dataset.match;

        item.classList.remove("correct","incorrect");

        if(ok){
            item.classList.add("correct");
            zone.classList.add("correct-zone"); // 👈 AQUÍ
            feedback.textContent = "✓";
            feedback.classList.add("correct-icon","show");
            aciertos++;
        }else{
            item.classList.add("incorrect");
            zone.classList.add("incorrect-zone"); // 👈 AQUÍ
            feedback.textContent = "✕";
            feedback.classList.add("incorrect-icon","show");
        }
    });

    let calificacion = (aciertos/7)*10;

    document.getElementById("resultado").textContent =
        `Aciertos: ${aciertos}/7 | Calificación: ${calificacion.toFixed(1)}/10`;

    let mensaje = "";
    if(calificacion === 10) mensaje="¡Excelente!";
    else if(calificacion >= 8) mensaje="Muy bien 👏";
    else mensaje="Sigue practicando 💪";

    document.getElementById("mensaje").textContent = mensaje;
}

// 🔄 REINICIAR
function reiniciar(){

    bloqueado = false;

    document.getElementById("resultado").textContent="";
    document.getElementById("mensaje").textContent="";

    document.querySelectorAll("audio").forEach(a=>{
        a.pause();
        a.currentTime = 0;
    });

    document.querySelectorAll(".dropzone").forEach(zone=>{
        zone.classList.remove("correct-zone","incorrect-zone");

        let feedback = zone.querySelector(".feedback");
        feedback.className = "feedback";
        feedback.textContent = "";

        let item = zone.querySelector(".draggable");
        if(item) item.remove();
    });

    shuffle(audiosData);

    right.innerHTML="";

    crearAudios();
}

// INICIO
crearAudios();

</script>
<div class="creditos">
    Copyright © 2026 · DTI. Arturo Hernández Maldonado · IEMS CDMX
</div>
</body>
</html>
