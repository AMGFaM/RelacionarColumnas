<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz musical interactiva</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#040426,#203a43,#4794b5);
    color:white;
    text-align:center;
}

.header{
    margin:20px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#e68f25;
    color:white;
    cursor:pointer;
    margin:5px;
}

button:hover{background:#e3830e;}

.main{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:25px;
    margin-top:20px;
}

table{
    border-collapse:separate;
    border-spacing:8px;
    table-layout:fixed;
    width:760px;
}

th{
    background:#00c3ff;
    padding:10px;
    border-radius:10px;
    width:130px;
    font-size:14px;
    white-space:normal;
    word-wrap:break-word;
}

td{
    background:#1e2a38;
    border:2px dashed #5dade2;
    border-radius:12px;
    width:130px;
    height:70px;
    position:relative;
    vertical-align:middle;
}

.periodo{
    background:#34495e;
    font-weight:bold;
}

.slot{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
	overflow:visible;
}

.bank{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:240px;
}

.draggable{
    background:#1e2a38;
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    user-select:none;

    display:flex;
    align-items:center;
    justify-content:center;
    min-height:56px;
    text-align:center;
}

.audio-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:#00c3ff;
    color:white;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:0;
    line-height:1;
    font-size:15px;
    text-indent:2px;
}

.correct{
    background:#2ecc71 !important;
}

.incorrect{
    background:#e74c3c !important;
}

.selected{
    outline:3px solid #f1c40f;
}

.resultado{
    margin-top:20px;
    font-size:18px;
}

.dropzone{
    position:relative;
    overflow:visible;
}

.feedback{
    position:absolute;
    top:6px;
    right:6px;
    width:22px;
    height:22px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:14px;
    font-weight:bold;

    opacity:0;
    transition:0.25s ease;
    z-index:20;
}

.feedback.show{
    opacity:1;
}

.correct-icon{
    background:#2ecc71;
    color:white;
}

.incorrect-icon{
    background:#e74c3c;
    color:white;
}
/* CRÉDITOS */
.creditos{
    position:fixed;
    bottom:-28px;
    left:0;
    width:100%;
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,0.65);
    background:rgba(0,0,0,0.18);
    padding:8px 0;
    transition:bottom 0.35s ease;
    backdrop-filter:blur(4px);
    z-index:999;
}

.creditos:hover{
    bottom:0;
}
</style>
</head>
<body>

<div class="header">
    <h1>Ejercicio histórico-musical</h1>
    <button onclick="verificar()">Verificar</button>
    <button onclick="reiniciar()">Reiniciar</button>
</div>

<div class="main">

<table>
<tr>
<th>Periodo</th>
<th>Compositor</th>
<th>Característica<br>musical</th>
<th>Hecho histórico o invento</th>
<th>Música</th>
</tr>

<tr>
<td class="periodo">Medieval</td>
<td class="dropzone" data-row="1" data-type="comp"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="1" data-type="rasgo"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="1" data-type="hecho"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="1" data-type="audio"><div class="slot"></div><div class="feedback"></div></td>
</tr>

<tr>
<td class="periodo">Renacimiento</td>
<td class="dropzone" data-row="2" data-type="comp"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="2" data-type="rasgo"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="2" data-type="hecho"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="2" data-type="audio"><div class="slot"></div><div class="feedback"></div></td>
</tr>

<tr>
<td class="periodo">Barroco</td>
<td class="dropzone" data-row="3" data-type="comp"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="3" data-type="rasgo"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="3" data-type="hecho"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="3" data-type="audio"><div class="slot"></div><div class="feedback"></div></td>
</tr>

<tr>
<td class="periodo">Clásico</td>
<td class="dropzone" data-row="4" data-type="comp"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="4" data-type="rasgo"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="4" data-type="hecho"><div class="slot"></div><div class="feedback"></div></td>
<td class="dropzone" data-row="4" data-type="audio"><div class="slot"></div><div class="feedback"></div></td>
</tr>
</table>

<div class="bank" id="bank"></div>

</div>

<div class="resultado" id="resultado"></div>

<script>

const items = [
{row:1,type:"comp",text:"Perotin"},
{row:1,type:"rasgo",text:"Canto gregoriano"},
{row:1,type:"hecho",text:"Molinos de viento"},
{row:1,type:"audio",audio:"medieval.mp3"},

{row:2,type:"comp",text:"Palestrina"},
{row:2,type:"rasgo",text:"Polifonía vocal"},
{row:2,type:"hecho",text:"Imprenta de Gutenberg"},
{row:2,type:"audio",audio:"renacimiento.mp3"},

{row:3,type:"comp",text:"J.S. Bach"},
{row:3,type:"rasgo",text:"Bajo continuo y Polifonía instrumental"},
{row:3,type:"hecho",text:"Telescopio"},
{row:3,type:"audio",audio:"barroco.mp3"},

{row:4,type:"comp",text:"Mozart"},
{row:4,type:"rasgo",text:"Melodía acompañada, menor complejidad polifónica"},
{row:4,type:"hecho",text:"Máquina de vapor de Watt"},
{row:4,type:"audio",audio:"clásico.mp3"}
];

let selected=null;

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
}

function render(){
shuffle(items);
const bank=document.getElementById("bank");
bank.innerHTML="";

items.forEach(item=>{
let div=document.createElement("div");
div.className="draggable";
div.dataset.row=item.row;
div.dataset.type=item.type;

if(item.type==="audio"){
div.innerHTML=`
    <button class="audio-btn">▶</button>
    <audio src="${item.audio}"></audio>
`;

let btn=div.querySelector("button");
let audio=div.querySelector("audio");

audio.onended=()=>{
    btn.textContent="▶";
};

btn.onclick=(e)=>{
    e.stopPropagation();

    document.querySelectorAll("audio").forEach(a=>{
        if(a!==audio){
            a.pause();
            a.currentTime=0;
            a.parentElement.querySelector("button").textContent="▶";
        }
    });

    if(audio.paused){
        audio.play();
        btn.textContent="⏸";
    }else{
        audio.pause();
        btn.textContent="▶";
    }

    document.querySelectorAll(".draggable").forEach(d=>{
        d.classList.remove("selected");
    });

    div.classList.add("selected");
    selected=div;
};
}else{
div.textContent=item.text;
}

div.onclick=()=>{
document.querySelectorAll(".draggable").forEach(d=>d.classList.remove("selected"));
div.classList.add("selected");
selected=div;
};

bank.appendChild(div);
});

document.querySelectorAll(".dropzone").forEach(zone=>{
zone.onclick=()=>{
    if(!selected) return;

    const slot=zone.querySelector(".slot");
    if(slot.children.length) return;

    let itemToMove = selected;

    itemToMove.style.transform="scale(0.85)";

    setTimeout(()=>{
        slot.appendChild(itemToMove);
        itemToMove.style.transform="scale(1)";
        itemToMove.classList.remove("selected");
    },250);

    selected=null;
};
});
}

function verificar(){
let correct=0;

document.querySelectorAll(".dropzone").forEach(zone=>{

    let item=zone.querySelector(".draggable");
    let feedback=zone.querySelector(".feedback");

    feedback.className="feedback";
    feedback.textContent="";

    if(!item) return;

    const ok=
    zone.dataset.row===item.dataset.row &&
    zone.dataset.type===item.dataset.type;

    item.classList.remove("correct","incorrect");
    item.classList.add(ok?"correct":"incorrect");

    if(ok){
        feedback.textContent="✓";
        feedback.classList.add("correct-icon","show");
        correct++;
    }else{
        feedback.textContent="✕";
        feedback.classList.add("incorrect-icon","show");
    }
});

document.getElementById("resultado").textContent=
`Aciertos: ${correct}/16`;
}

function reiniciar(){

document.querySelectorAll(".slot").forEach(s=>s.innerHTML="");

document.querySelectorAll(".feedback").forEach(f=>{
    f.className="feedback";
    f.textContent="";
});

render();

document.getElementById("resultado").textContent="";
}
render();

</script>
<div class="creditos">
    Copyright © 2026 · DTI · Arturo Hernández Maldonado · IEMS CDMX
</div>
</body>
</html>
